<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twinx Effect Studio • Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-emerald-600 to-emerald-800 min-h-screen flex items-center justify-center font-sans">
  <!-- Background Logo -->
<div class="fixed inset-0 flex items-center justify-center pointer-events-none z-0">
  <img src="./assets/images/logo.png" 
       class="w-full max-w-[180vw] h-[85vh] object-obtain opacity-50 scale-125 " 
       alt="background logo">
</div>
  <div class="relative z-10 max-w-md w-full mx-4">
    <div class="text-center mb-10">
      <p class="text-emerald-100 mt-2 text-lg">Capture Moments That Last Forever</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h2 class="text-3xl font-semibold text-center text-emerald-900 mb-1">Welcome Back</h2>
      <p class="text-center text-emerald-600 mb-8">Sign in to book your professional shoot</p>

      <!-- Role Buttons -->
      <div class="flex bg-emerald-100 rounded-3xl p-1 mb-8">
        <button onclick="switchRole(0)" id="clientBtn"
          class="flex-1 py-4 rounded-3xl font-medium text-emerald-700 active">👤 Client</button>
        <button onclick="switchRole(1)" id="adminBtn"
          class="flex-1 py-4 rounded-3xl font-medium text-emerald-700">🛠️ Admin</button>
      </div>

      <form id="authForm" onsubmit="handleAuth(event)" class="space-y-6">
        <div id="nameField" class="hidden">
          <label class="block text-sm font-medium text-emerald-800 mb-1">Full Name</label>
          <input type="text" id="fullName" placeholder="Mary Anim" 
            class="w-full px-5 py-4 rounded-2xl border border-emerald-200 focus:border-emerald-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-emerald-800 mb-1">Email Address</label>
          <input type="email" id="email" required placeholder="you@gmail.com"
            class="w-full px-5 py-4 rounded-2xl border border-emerald-200 focus:border-emerald-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-800 mb-1">Password</label>
          <input type="password" id="password" required placeholder="••••••••"
            class="w-full px-5 py-4 rounded-2xl border border-emerald-200 focus:border-emerald-500 outline-none">
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg transition-all">
          <span id="btnText">Sign In as Client</span>
        </button>
      </form>

      <div class="text-center mt-6 text-emerald-700">
        <span id="modeText">Don't have an account?</span> 
        <button onclick="toggleMode()" id="modeLink" class="font-medium text-emerald-600 hover:underline ml-1">Create one</button>
      </div>

      <div class="mt-8 pt-6 border-t text-center">
        <a href="https://wa.me/233XXXXXXXXX" target="_blank" class="inline-flex items-center gap-2 text-emerald-600 hover:text-emerald-700">
          <i class="fa-brands fa-whatsapp text-2xl"></i>
          Chat with us on WhatsApp
        </a>
      </div>
    </div>

      <!-- Social Media on Login Page -->
      <div class="mt-10 text-center">
        <p class="text-emerald-100 text-sm mb-4">Follow us for more inspiration</p>
        <div class="flex justify-center gap-8 text-3xl">
          <a href="https://www.facebook.com/share/14cLY1skyCk/?mibextid=wwXIfr" target="_blank" 
            class="text-white hover:text-emerald-200 transition">
            <i class="fa-brands fa-facebook"></i>
          </a>
          <a href="https://www.instagram.com/twinxeffect_memories?igsh=MTB1eHpmMWg1amxlMA%3D%3D&utm_source=qr" target="_blank" 
            class="text-white hover:text-emerald-200 transition">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="https://www.tiktok.com/@twinxeffect_studios?_r=1&_t=ZS-95VUhZzH1QQ" target="_blank" 
            class="text-white hover:text-emerald-200 transition">
            <i class="fa-brands fa-tiktok"></i>
          </a>
        </div>
      </div>

    <p class="text-center text-emerald-100 text-xs mt-8">© 2026 Twinx Effect Studio • Accra, Ghana</p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
